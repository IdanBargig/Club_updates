<!DOCTYPE html>
<html lang="he">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>מסיבות נוער</title>
    <style>
        /* כללי */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
            animation: changeColor 30s infinite;
            }

        .whatsapp-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: center; /* ממרכז את הכפתור מעל הטקסט */
            z-index: 9999;
            }

        /* התאמה לטלפון */
        @media (max-width: 600px) {
            .whatsapp-container {
                bottom: 15px;
                right: 15px;
                }
            }

        .whatsapp-glass-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(14px) saturate(160%);
            -webkit-backdrop-filter: blur(14px) saturate(160%);
            box-shadow: 0 8px 20px rgba(0,0,0,0.35);
            }

        .whatsapp-glass-btn img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            }

        .wa-text {
            font-size: 14px;
            color: #fff;
            font-weight: bold;
            margin: 0;
            text-shadow: 0 0 6px rgba(0,0,0,0.6);
            }
        
        @keyframes changeColor {
            0%, 100% {
                background-color: #FF0000;
            }

            10% {
                background-color: #FF4500;
            }

            20% {
                background-color: #FF8C00;
            }

            30% {
                background-color: #FFD700;
            }

            40% {
                background-color: #ADFF2F;
            }

            50% {
                background-color: #32CD32;
            }

            60% {
                background-color: #00FF7F;
            }

            70% {
                background-color: #00CED1;
            }

            80% {
                background-color: #4169E1;
            }

            90% {
                background-color: #8A2BE2;
            }
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1em;
        }

        h1 {
            margin: 0;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            }

            50% {
                text-shadow: 0 0 20px rgba(255, 255, 255, 1);
            }
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        nav a {
            padding: 8px 18px; /* גודל רגיל */
            font-size: 15px;
            font-weight: bold;
            border-radius: 10px;

            color: white;
            text-decoration: none;

            background: rgba(255, 255, 255, 0.15); /* שקיפות */
            border: 1px solid rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);

            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
            transition: 0.25s;
        }

        nav a:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        
            nav {
            display: flex;
            justify-content: center; /* מיישור לאמצע */
            margin-top: 5px; /* מרווח מלמעלה */
            margin-bottom: 1px; /* מרווח מלמטה */
        }


        nav a:hover {
            background-color: black;
            color: white;
        }

        nav a.special {
            background-color: #ff0000;
            border-color: white; /* צבע המסגרת במצב hover */
        }

        main {
            padding: 1em;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .club {
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(12px) saturate(180%);
        -webkit-backdrop-filter: blur(12px) saturate(180%);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        padding: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        transition: transform 0.3s, box-shadow 0.3s;
        }
        .club:hover {
        transform: scale(1.04);
        box-shadow: 0 12px 28px rgba(0,0,0,0.25);
        }

        .club img {
            width: 100%;
            height: auto;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
        }

        .club-details {
            padding: 1em;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .club-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 0.5em;
        }

        .club-date {
            font-size: 0.9em;
            color: #777;
            margin-bottom: 0.5em;
        }

        .club-link {
            color: #007BFF;
            font-weight: bold;
            text-decoration: none;
            transition: color 0.3s;
        }

        .club-link:hover {
            color: #0056b3;
            text-decoration: underline;
        }
    </style>
</head>
